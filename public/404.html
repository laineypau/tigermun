<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <title>TigerMUN</title>
    <script type="text/javascript">
      // Single Page Apps for GitHub Pages
      // https://github.com/rafgraph/spa-github-pages
      // Encodes the requested path into a query string and redirects to the
      // app's index.html, which decodes it back (see the snippet in index.html).
      // pathSegmentsToKeep = 1 because the site is served from the
      // laineypau.github.io/tigermun/ project-pages subpath.
      var pathSegmentsToKeep = 1;
      var l = window.location;
      l.replace(
        l.protocol + '//' + l.hostname + (l.port ? ':' + l.port : '') +
        l.pathname.split('/').slice(0, 1 + pathSegmentsToKeep).join('/') + '/?/' +
        l.pathname.slice(1).split('/').slice(pathSegmentsToKeep).join('/').replace(/&/g, '~and~') +
        (l.search ? '&' + l.search.slice(1).replace(/&/g, '~and~') : '') +
        l.hash
      );
    </script>
  </head>
  <body></body>
</html>
